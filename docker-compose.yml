services:
  ministack:
    build: .
    image: ministackorg/ministack:latest
    container_name: ministack
    ports:
      - "4566:4566"
    environment:
      - GATEWAY_PORT=4566
      - LOG_LEVEL=INFO
      - S3_PERSIST=0
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RDS_BASE_PORT=15432
      # - DOCKER_NETWORK=ministack_default  # Docker network for RDS/EKS/ElastiCache/Lambda containers
      - ELASTICACHE_BASE_PORT=16379
      # OpenSearch: in-memory by default. Override at launch to spawn a real
      # `opensearchproject/opensearch` container per CreateDomain (same
      # pattern as ElastiCache/RDS). Spawned containers are labeled with
      # `com.docker.compose.project=ministack` so they show up in the
      # ministack group in Docker Desktop. Per-domain endpoint returned by
      # DescribeDomain is `localhost:<OPENSEARCH_BASE_PORT + N>`.
      #
      # Add OPENSEARCH_DASHBOARDS=1 to additionally spawn a per-domain
      # `opensearchproject/opensearch-dashboards` sidecar, wired to the
      # cluster container over a shared `ministack-opensearch-net` bridge
      # and published on localhost:<OPENSEARCH_DASHBOARDS_BASE_PORT + N>.
      # DescribeDomain then populates `DomainStatus.DashboardEndpoint`.
      #
      # Override without editing this file by setting the env var in the
      # shell or a `.env` file next to docker-compose.yml, e.g.
      #   OPENSEARCH_DATAPLANE=1 docker compose up -d
      #   OPENSEARCH_DATAPLANE=1 OPENSEARCH_DASHBOARDS=1 docker compose up -d
      - OPENSEARCH_DATAPLANE=${OPENSEARCH_DATAPLANE:-0}
      - OPENSEARCH_BASE_PORT=${OPENSEARCH_BASE_PORT:-14571}
      - OPENSEARCH_IMAGE=${OPENSEARCH_IMAGE:-opensearchproject/opensearch:2.15.0}
      - OPENSEARCH_DASHBOARDS=${OPENSEARCH_DASHBOARDS:-0}
      - OPENSEARCH_DASHBOARDS_BASE_PORT=${OPENSEARCH_DASHBOARDS_BASE_PORT:-15601}
      - OPENSEARCH_DASHBOARDS_IMAGE=${OPENSEARCH_DASHBOARDS_IMAGE:-opensearchproject/opensearch-dashboards:2.15.0}
    volumes:
      - ./data/s3:/tmp/ministack-data/s3
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4566/_ministack/health')"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ministack-redis
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # Optional: Postgres for RDS (always-on, no Docker-in-Docker needed)
  # Uncomment to have a persistent Postgres available at localhost:5432
  # postgres:
  #   image: postgres:15-alpine
  #   container_name: ministack-postgres
  #   ports:
  #     - "5432:5432"
  #   environment:
  #     POSTGRES_USER: admin
  #     POSTGRES_PASSWORD: password
  #     POSTGRES_DB: mydb
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U admin"]
  #     interval: 5s
  #     timeout: 3s
  #     retries: 5
  #   restart: unless-stopped
